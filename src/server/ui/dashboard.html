<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eye Fatigue Tracker — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Dashboard-specific layout */
    .dashboard-container {
      display: grid;
      grid-template-columns: 320px 1fr 1fr 1fr;
      gap: 20px;
      padding: 24px;
      min-height: calc(100vh - 53px);
    }

    /* Header adjustments */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-signout {
      background: var(--purple-mid);
      color: var(--white);
      padding: 10px 24px;
      border-radius: var(--radius-pill);
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-signout:hover {
      opacity: 0.85;
    }

    /* Profile Card */
    .profile-card {
      background: var(--lavender-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      grid-row: 1 / 3;
    }

    .profile-card h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--purple-dark);
      text-align: center;
    }

    .profile-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto;
      border: 3px solid var(--purple-dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
    }

    .profile-icon svg {
      width: 60px;
      height: 60px;
      color: var(--purple-dark);
    }

    .profile-text {
      text-align: center;
      color: var(--purple-dark);
      font-weight: 600;
      font-size: 16px;
    }

    .profile-details {
      text-align: center;
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.6;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin: 12px 0;
    }

    .calendar-day {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      transition: all 0.2s;
    }

    .calendar-day.active {
      background: var(--purple-dark);
      color: var(--white);
    }

    .calendar-day:hover {
      transform: scale(1.1);
    }

    .btn-new-session {
      background: var(--green);
      color: var(--white);
      padding: 12px 24px;
      border-radius: var(--radius-pill);
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }

    .btn-new-session:hover {
      opacity: 0.85;
    }

    /* Latest Card */
    .latest-card {
      background: var(--lavender-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      grid-column: 2;
      grid-row: 1;
    }

    .latest-card h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--purple-dark);
      margin-bottom: 20px;
      text-align: center;
    }

    .metrics-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      text-align: center;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .metric-number {
      font-size: 32px;
      font-weight: 700;
      color: var(--purple-dark);
    }

    .metric-label {
      font-size: 13px;
      color: var(--text-mid);
      font-weight: 500;
    }

    /* Info Cards */
    .info-card {
      background: var(--lavender-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
    }

    .info-card .question {
      font-size: 24px;
      font-weight: 700;
      color: var(--purple-dark);
    }

    .info-card p {
      font-size: 14px;
      color: var(--purple-dark);
      font-weight: 600;
      line-height: 1.4;
    }

    /* Historical Trends */
    .trends-card {
      background: var(--lavender-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      grid-column: 2 / 5;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .chart-container {
      position: relative;
      width: 100%;
      height: 280px;
      display: block;
    }

    .chart-container canvas {
      max-height: 280px;
    }

    .trends-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .trends-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--purple-dark);
    }

    .trends-chart {
      width: 100%;
      height: 300px;
      display: flex;
      align-items: flex-end;
      gap: 40px;
      padding: 0 20px;
    }

    .chart-point {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
      height: 100%;
      justify-content: flex-end;
    }

    .chart-bar {
      width: 100%;
      background: linear-gradient(to top, var(--purple-dark), var(--purple-mid));
      border-radius: 4px 4px 0 0;
      min-height: 20px;
    }

    .chart-label {
      font-size: 12px;
      color: var(--text-mid);
      text-align: center;
      white-space: nowrap;
    }

    /* Line chart using SVG */
    .chart-svg {
      width: 100%;
      height: 250px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M2 12C2 12 6 5 12 5C18 5 22 12 22 12C22 12 18 19 12 19C6 19 2 12 2 12Z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <h1>Eye Fatigue Tracker</h1>
    </div>
    <button class="btn-signout" onclick="clearSession(); window.location.href='index.html';">Sign Out</button>
  </header>

  <!-- Dashboard -->
  <main class="dashboard-container">

    <!-- Profile Card -->
    <div class="profile-card">
      <h2>Profile</h2>
      <div class="profile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="profile-text" id="profile-username">User</div>
      <script>
        // Set username immediately
        const currentUser = localStorage.getItem('eft_user');
        if (currentUser) {
          document.getElementById('profile-username').textContent = currentUser;
        }
      </script>
      <div class="profile-details">
        <div>Last Session: <span id="last-recording">No recordings yet</span></div>
        <div>Total Sessions: <span id="total-sessions">0</span></div>
      </div>
      <div class="calendar-grid">
        <div class="calendar-day active">1</div>
        <div class="calendar-day active">2</div>
        <div class="calendar-day">3</div>
        <div class="calendar-day active">4</div>
        <div class="calendar-day active">5</div>
        <div class="calendar-day active">6</div>
        <div class="calendar-day">7</div>
        <div class="calendar-day active">8</div>
        <div class="calendar-day">9</div>
        <div class="calendar-day">10</div>
        <div class="calendar-day">11</div>
        <div class="calendar-day">12</div>
        <div class="calendar-day">13</div>
        <div class="calendar-day">14</div>
        <div class="calendar-day">15</div>
        <div class="calendar-day">16</div>
        <div class="calendar-day">17</div>
        <div class="calendar-day">18</div>
        <div class="calendar-day">19</div>
        <div class="calendar-day">20</div>
        <div class="calendar-day">21</div>
        <div class="calendar-day">22</div>
        <div class="calendar-day">23</div>
        <div class="calendar-day">24</div>
        <div class="calendar-day">25</div>
        <div class="calendar-day">26</div>
        <div class="calendar-day">27</div>
        <div class="calendar-day">28</div>
        <div class="calendar-day">29</div>
        <div class="calendar-day">30</div>
      </div>
      <button class="btn-new-session" onclick="window.location.href='calibration.html'">New Session</button>
    </div>

    <!-- Latest Card -->
    <div class="latest-card">
      <h2>Latest</h2>
      <div class="metrics-row">
        <div class="metric">
          <div class="metric-number" id="latest-fatigue">-</div>
          <div class="metric-label">fatigue score</div>
        </div>
        <div class="metric">
          <div class="metric-number" id="latest-blinks">-</div>
          <div class="metric-label">blinks per minute</div>
        </div>
      </div>
    </div>

    <!-- Info Cards -->
    <div class="info-card">
      <div class="question">?</div>
      <p>What is Computer Vision Syndrome?</p>
    </div>

    <div class="info-card">
      <div class="question">?</div>
      <p>How to improve eye health?</p>
    </div>

    <!-- Historical Trends -->
    <div class="trends-card">
      <div class="trends-header">
        <h2>Historical Trends</h2>
        <div class="toggle-group" id="trend-toggle">
          <button class="active" onclick="setTrend('day', this)">Day</button>
          <button onclick="setTrend('week', this)">Week</button>
          <button onclick="setTrend('month', this)">Month</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="chart-fatigue"></canvas>
      </div>
      <script>
        // Initialize chart immediately when canvas is in DOM
        console.log('Canvas found, creating initial chart');
        if (window.Chart && csvData && csvData.day && csvData.day.length > 0) {
          const labels = csvData.day.map(d => d.Time);
          const data = csvData.day.map(d => d['Fatigue Score']);
          fatigueChart = new Chart(document.getElementById('chart-fatigue'), {
            type: 'line',
            data: {
              labels: labels,
              datasets: [{
                label: 'Fatigue Score',
                data: data,
                borderColor: '#3D2D7A',
                backgroundColor: 'transparent',
                borderWidth: 3,
                fill: false,
                tension: 0.4,
                pointRadius: 6,
                pointBackgroundColor: '#3D2D7A',
                pointBorderColor: '#FFFFFF',
                pointBorderWidth: 2,
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: {
                  grid: { display: false },
                  ticks: { font: { size: 11 }, color: '#7B6BA8' },
                },
                y: {
                  grid: { color: 'rgba(196,181,224,0.4)' },
                  ticks: { font: { size: 11 }, color: '#7B6BA8' },
                  beginAtZero: true,
                  max: 10,
                },
              },
            },
          });
        }
      </script>
    </div>

  </main>

  <script src="app.js"></script>
  <script>
    let fatigueChart = null;

    function handleSignOut() {
      clearSession();
      window.location.href = 'index.html';
    }

    function handleNewSession() {
      console.log('New Session clicked');
      window.location.href = 'calibration.html';
    }

    let csvData = {
      day: [
        { Time: '9am', 'Fatigue Score': 2.1, 'Blinks per Minute': 3.1 },
        { Time: '10am', 'Fatigue Score': 3.5, 'Blinks per Minute': 3.4 },
        { Time: '11am', 'Fatigue Score': 5.2, 'Blinks per Minute': 3.9 },
        { Time: '12pm', 'Fatigue Score': 6.8, 'Blinks per Minute': 4.2 },
        { Time: '1pm', 'Fatigue Score': 4.3, 'Blinks per Minute': 3.7 },
        { Time: '2pm', 'Fatigue Score': 7.1, 'Blinks per Minute': 4.5 },
        { Time: '3pm', 'Fatigue Score': 5.9, 'Blinks per Minute': 3.8 },
      ],
      week: [
        { Day: 'Monday', 'Fatigue Score': 4.1, 'Blinks per Minute': 3.2 },
        { Day: 'Tuesday', 'Fatigue Score': 6.2, 'Blinks per Minute': 3.8 },
        { Day: 'Wednesday', 'Fatigue Score': 3.8, 'Blinks per Minute': 2.9 },
        { Day: 'Thursday', 'Fatigue Score': 7.6, 'Blinks per Minute': 4.1 },
        { Day: 'Friday', 'Fatigue Score': 5.3, 'Blinks per Minute': 3.5 },
        { Day: 'Saturday', 'Fatigue Score': 3.1, 'Blinks per Minute': 2.7 },
        { Day: 'Sunday', 'Fatigue Score': 4.8, 'Blinks per Minute': 3.9 },
      ],
      month: [
        { Week: 'Week 1', 'Fatigue Score': 5.2, 'Blinks per Minute': 3.5 },
        { Week: 'Week 2', 'Fatigue Score': 6.1, 'Blinks per Minute': 3.8 },
        { Week: 'Week 3', 'Fatigue Score': 4.9, 'Blinks per Minute': 3.2 },
        { Week: 'Week 4', 'Fatigue Score': 5.8, 'Blinks per Minute': 3.6 },
        { Week: 'Week 5', 'Fatigue Score': 6.3, 'Blinks per Minute': 4.0 },
        { Week: 'Week 6', 'Fatigue Score': 5.1, 'Blinks per Minute': 3.4 },
        { Week: 'Week 7', 'Fatigue Score': 5.9, 'Blinks per Minute': 3.7 },
        { Week: 'Week 8', 'Fatigue Score': 6.2, 'Blinks per Minute': 3.9 },
      ],
    };

    // Parse CSV file
    async function loadCSV(file) {
      try {
        const response = await fetch(file);
        const text = await response.text();
        const lines = text.trim().split('\n').filter(line => line.trim());
        const headers = lines[0].split(',').map(h => h.trim());
        const data = [];

        for (let i = 1; i < lines.length; i++) {
          const values = lines[i].split(',').map(v => v.trim());
          const row = {};
          headers.forEach((header, idx) => {
            const value = values[idx];
            row[header] = isNaN(value) ? value : parseFloat(value);
          });
          data.push(row);
        }
        console.log(`Loaded ${file}:`, data);
        return data;
      } catch (error) {
        console.error('Error loading CSV:', error);
        return [];
      }
    }

    function initDashboardView() {
      const username = getSession();
      console.log('Current username:', username);
      if (!username) {
        window.location.href = 'index.html';
        return;
      }

      const users = getUsers();
      const user = users[username];
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      // Update profile info
      console.log('Setting username to:', username);
      document.getElementById('profile-username').textContent = username;
      document.getElementById('last-recording').textContent = user.lastRecording || 'No recordings yet';
      document.getElementById('total-sessions').textContent = (Math.floor(Math.random() * 30) + 1);

      // Load CSV files
      Promise.all([
        loadCSV('data_day.csv'),
        loadCSV('data_week.csv'),
        loadCSV('data_month.csv'),
      ]).then(([dayData, weekData, monthData]) => {
        csvData.day = dayData;
        csvData.week = weekData;
        csvData.month = monthData;

        console.log('CSV Data loaded:', csvData);
        initCharts('day');
        updateLatestMetrics('day');
      }).catch(error => {
        console.error('Failed to load CSV data:', error);
      });
    }

    function updateLatestMetrics(view) {
      const data = csvData[view];
      if (!data || data.length === 0) return;

      const latest = data[data.length - 1];
      const latestFatigue = latest['Fatigue Score'];
      const latestBlinks = Math.round(latest['Blinks per Minute'] * 10);

      document.getElementById('latest-fatigue').textContent = `${latestFatigue.toFixed(1)}/10`;
      document.getElementById('latest-blinks').textContent = latestBlinks;
    }

    function getLabels(view) {
      const data = csvData[view];
      if (!data) return [];

      const headers = Object.keys(data[0]);
      return data.map(row => row[headers[0]]);
    }

    function getFatigueData(view) {
      const data = csvData[view];
      if (!data) return [];
      return data.map(row => row['Fatigue Score']);
    }

    function initCharts(view) {
      const labels = getLabels(view);
      const fatigueData = getFatigueData(view);

      if (labels.length === 0 || fatigueData.length === 0) {
        console.warn('No data available for view:', view);
        return;
      }

      const ctx = document.getElementById('chart-fatigue');
      if (!ctx) {
        console.error('Canvas element not found');
        return;
      }

      if (fatigueChart) {
        fatigueChart.destroy();
      }

      fatigueChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Fatigue Score',
            data: fatigueData,
            borderColor: '#3D2D7A',
            backgroundColor: 'transparent',
            borderWidth: 3,
            fill: false,
            tension: 0.4,
            pointRadius: 6,
            pointBackgroundColor: '#3D2D7A',
            pointBorderColor: '#FFFFFF',
            pointBorderWidth: 2,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { size: 11 }, color: '#7B6BA8' },
            },
            y: {
              grid: { color: 'rgba(196,181,224,0.4)' },
              ticks: { font: { size: 11 }, color: '#7B6BA8' },
              beginAtZero: true,
              max: 10,
            },
          },
        },
      });
    }

    function setTrend(view, btn) {
      document.querySelectorAll('#trend-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      initCharts(view);
      updateLatestMetrics(view);
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initDashboardView();
      // Display metrics immediately with demo data
      setTimeout(() => {
        if (csvData.day && csvData.day.length > 0) {
          const latest = csvData.day[csvData.day.length - 1];
          document.getElementById('latest-fatigue').textContent = `${latest['Fatigue Score'].toFixed(1)}/10`;
          document.getElementById('latest-blinks').textContent = Math.round(latest['Blinks per Minute'] * 10);
        }
      }, 10);
    });
  </script>
</body>
</html>
