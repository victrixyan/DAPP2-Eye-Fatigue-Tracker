<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eye Fatigue Tracker — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Dashboard-specific layout */
    .dashboard-container {
      display: grid;
      grid-template-columns: 320px 1fr 1fr 1fr;
      gap: 20px;
      padding: 24px;
      min-height: calc(100vh - 53px);
    }

    /* Header adjustments */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-signout {
      background: var(--purple-mid);
      color: var(--white);
      padding: 10px 24px;
      border-radius: var(--radius-pill);
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-signout:hover {
      opacity: 0.85;
    }

    /* Profile Card */
    .profile-card {
      background: var(--lavender-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      grid-row: 1 / 3;
    }

    .profile-card h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--purple-dark);
      text-align: center;
    }

    .profile-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto;
      border: 3px solid var(--purple-dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
    }

    .profile-icon svg {
      width: 60px;
      height: 60px;
      color: var(--purple-dark);
    }

    .profile-text {
      text-align: center;
      color: var(--purple-dark);
      font-weight: 600;
      font-size: 16px;
    }

    .profile-details {
      text-align: center;
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.6;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin: 12px 0;
    }

    .calendar-day {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      transition: all 0.2s;
    }

    .calendar-day.active {
      background: var(--purple-dark);
      color: var(--white);
    }

    .calendar-day:hover {
      transform: scale(1.1);
    }

    .btn-new-session {
      background: var(--green);
      color: var(--white);
      padding: 12px 24px;
      border-radius: var(--radius-pill);
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }

    .btn-new-session:hover {
      opacity: 0.85;
    }

    /* Latest Card */
    .latest-card {
      background: var(--lavender-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      grid-column: 2;
      grid-row: 1;
    }

    .latest-card h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--purple-dark);
      margin-bottom: 20px;
      text-align: center;
    }

    .metrics-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      text-align: center;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .metric-number {
      font-size: 32px;
      font-weight: 700;
      color: var(--purple-dark);
    }

    .metric-label {
      font-size: 13px;
      color: var(--text-mid);
      font-weight: 500;
    }

    /* Info Cards */
    .info-card {
      background: var(--lavender-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      cursor: pointer;
      align-self: stretch;
      transition: opacity 0.2s;
    }

    .info-card:hover {
      opacity: 0.9;
    }

    .info-card .question {
      font-size: 24px;
      font-weight: 700;
      color: var(--purple-dark);
      line-height: 1;
    }

    .info-card p {
      font-size: 14px;
      color: var(--purple-dark);
      font-weight: 600;
      line-height: 1.4;
      margin: 0;
    }

    /* FAQ answer popup */
    .faq-overlay {
      position: fixed;
      inset: 0;
      background: rgba(45, 27, 105, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 1000;
    }

    .faq-overlay[hidden] {
      display: none;
    }

    .faq-modal {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(45, 27, 105, 0.18);
      text-align: center;
    }

    .faq-modal h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--purple-dark);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .faq-modal p {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.6;
      margin: 0;
    }

    /* Historical Trends */
    .trends-card {
      background: var(--lavender-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      grid-column: 2 / 5;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .chart-container {
      position: relative;
      width: 100%;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chart-container.is-empty canvas {
      display: none;
    }

    .trends-empty {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-mid);
      text-align: center;
    }

    .chart-container canvas {
      max-height: 280px;
    }

    .trends-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .trends-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--purple-dark);
    }

    .trends-chart {
      width: 100%;
      height: 300px;
      display: flex;
      align-items: flex-end;
      gap: 40px;
      padding: 0 20px;
    }

    .chart-point {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
      height: 100%;
      justify-content: flex-end;
    }

    .chart-bar {
      width: 100%;
      background: linear-gradient(to top, var(--purple-dark), var(--purple-mid));
      border-radius: 4px 4px 0 0;
      min-height: 20px;
    }

    .chart-label {
      font-size: 12px;
      color: var(--text-mid);
      text-align: center;
      white-space: nowrap;
    }

    /* Line chart using SVG */
    .chart-svg {
      width: 100%;
      height: 250px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M2 12C2 12 6 5 12 5C18 5 22 12 22 12C22 12 18 19 12 19C6 19 2 12 2 12Z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <h1>Eye Fatigue Tracker</h1>
    </div>
    <button class="btn-signout" onclick="signOut()">Sign Out</button>
  </header>

  <!-- Dashboard -->
  <main class="dashboard-container">

    <!-- Profile Card -->
    <div class="profile-card">
      <h2>Profile</h2>
      <div class="profile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="profile-text" id="profile-username">User</div>
      <div class="profile-details">
        <div>Last Session: <span id="last-recording">No recordings yet</span></div>
        <div>Total Sessions: <span id="total-sessions">0</span></div>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
      <button class="btn-new-session" onclick="handleNewSession()">New Session</button>
    </div>

    <!-- Latest Card -->
    <div class="latest-card">
      <h2>Latest</h2>
      <div class="metrics-row">
        <div class="metric">
          <div class="metric-number" id="latest-fatigue">-</div>
          <div class="metric-label">fatigue score</div>
        </div>
        <div class="metric">
          <div class="metric-number" id="latest-blinks">-</div>
          <div class="metric-label">blinks per minute</div>
        </div>
      </div>
    </div>

    <!-- Info Cards -->
    <div class="info-card" data-faq="cvs" role="button" tabindex="0">
      <div class="question">?</div>
      <p>What is Computer Vision Syndrome?</p>
    </div>

    <div class="info-card" data-faq="eye-health" role="button" tabindex="0">
      <div class="question">?</div>
      <p>How to improve eye health?</p>
    </div>

    <!-- Historical Trends -->
    <div class="trends-card">
      <div class="trends-header">
        <h2>Historical Trends</h2>
        <div class="toggle-group" id="trend-toggle">
          <button class="active" onclick="setTrend('day', this)">Day</button>
          <button onclick="setTrend('week', this)">Week</button>
          <button onclick="setTrend('month', this)">Month</button>
        </div>
      </div>
      <div class="chart-container" id="trends-chart-container">
        <div class="trends-empty" id="trends-empty" hidden>No Historical Data</div>
        <canvas id="chart-fatigue"></canvas>
      </div>
    </div>

  </main>

  <div class="faq-overlay" id="faq-overlay" hidden>
    <div class="faq-modal" id="faq-modal">
      <h3 id="faq-modal-title"></h3>
      <p id="faq-modal-answer"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
