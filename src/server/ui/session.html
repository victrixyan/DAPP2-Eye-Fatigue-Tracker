<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eye Fatigue Tracker — Session</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .session-container {
      display: grid;
      grid-template-columns: 320px 1fr 1fr 1fr;
      gap: 20px;
      padding: 24px;
      min-height: calc(100vh - 53px);
    }

    .header {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 10px;
    }

    .profile-card {
      background: var(--lavender-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      grid-row: 1 / 3;
    }

    .profile-card h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--purple-dark);
      text-align: center;
    }

    .profile-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto;
      border: 3px solid var(--purple-dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
    }

    .profile-icon svg {
      width: 60px;
      height: 60px;
      color: var(--purple-dark);
    }

    .profile-text {
      text-align: center;
      color: var(--purple-dark);
      font-weight: 600;
      font-size: 16px;
    }

    .session-timer-label {
      text-align: center;
      color: var(--text-mid);
      font-weight: 600;
      font-size: 14px;
      margin-top: 12px;
    }

    .session-timer {
      text-align: center;
      font-size: 42px;
      font-weight: 700;
      color: var(--purple-dark);
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      margin: 12px 0 24px;
    }

    .btn-pause {
      background: #FFD580;
      color: var(--white);
      padding: 12px 24px;
      border-radius: var(--radius-pill);
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      margin-bottom: 12px;
    }

    .btn-pause.continue {
      background: var(--green);
    }

    .btn-pause:hover {
      opacity: 0.85;
    }

    .btn-end {
      background: #FF9999;
      color: var(--white);
      padding: 12px 24px;
      border-radius: var(--radius-pill);
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }

    .btn-end:hover {
      opacity: 0.85;
    }

    .current-card {
      grid-column: 2;
      grid-row: 1;
    }

    /* Latest / Current metrics panel (inline so Pi always gets card styling) */
    .metrics-panel {
      background: var(--lavender-soft);
      border-radius: 40px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      align-self: stretch;
      min-height: 200px;
    }

    .metrics-panel h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--purple-dark);
      text-align: center;
      margin: 0;
      width: 100%;
    }

    .metrics-panel .metrics-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .metrics-panel .metric-row {
      display: grid;
      grid-template-columns: max-content max-content;
      column-gap: 20px;
      align-items: baseline;
    }

    .metrics-panel .metric-row .metric-value {
      font-size: 34px;
      font-weight: 700;
      color: var(--purple-dark);
      text-align: right;
      line-height: 1.1;
      padding: 0;
      min-width: 1.5ch;
    }

    .metrics-panel .metric-row .metric-label {
      font-size: 14px;
      font-weight: 400;
      color: var(--purple-dark);
      text-align: left;
      line-height: 1.3;
      align-self: center;
    }

    .info-card {
      background: var(--lavender-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      cursor: pointer;
      align-self: stretch;
      transition: opacity 0.2s;
    }

    .info-card:hover {
      opacity: 0.9;
    }

    .info-card .question {
      font-size: 24px;
      font-weight: 700;
      color: var(--purple-dark);
      line-height: 1;
    }

    .info-card p {
      font-size: 14px;
      color: var(--purple-dark);
      font-weight: 600;
      line-height: 1.4;
      margin: 0;
    }

    /* FAQ answer popup */
    .faq-overlay {
      position: fixed;
      inset: 0;
      background: rgba(45, 27, 105, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 1000;
    }

    .faq-overlay[hidden] {
      display: none;
    }

    .faq-modal {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(45, 27, 105, 0.18);
      text-align: center;
    }

    .faq-modal h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--purple-dark);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .faq-modal p {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.6;
      margin: 0;
      text-align: left;
      white-space: pre-line;
    }

    .trends-card {
      background: var(--lavender-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      grid-column: 2 / 5;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .trends-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--purple-dark);
    }

    .chart-container {
      position: relative;
      width: 100%;
      height: 280px;
      display: block;
    }

    .chart-container canvas {
      max-height: 280px;
    }
  </style>
</head>
<body>

  <header class="header">
    <svg class="header-icon" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2">
      <path d="M2 12C2 12 6 5 12 5C18 5 22 12 22 12C22 12 18 19 12 19C6 19 2 12 2 12Z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <h1>Eye Fatigue Tracker</h1>
  </header>

  <main class="session-container">

    <div class="profile-card">
      <h2>Profile</h2>
      <div class="profile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="profile-text" id="profile-username">User</div>
      <div class="session-timer-label">Session Timer</div>
      <div class="session-timer" id="session-timer">00:00:00</div>
      <button class="btn-pause" id="btn-pause" type="button" onclick="handlePause()">Pause</button>
      <button class="btn-end" type="button" onclick="handleEndSession()">End Session</button>
    </div>

    <div class="current-card metrics-panel">
      <h2>Current</h2>
      <div class="metrics-list">
        <div class="metric-row">
          <span class="metric-value" id="current-fatigue">0</span>
          <span class="metric-label">fatigue score</span>
        </div>
        <div class="metric-row">
          <span class="metric-value" id="current-blinks">0</span>
          <span class="metric-label">blinks per minute</span>
        </div>
      </div>
    </div>

    <div class="info-card" data-faq="cvs" role="button" tabindex="0">
      <div class="question">?</div>
      <p>What is Computer Vision Syndrome?</p>
    </div>

    <div class="info-card" data-faq="eye-health" role="button" tabindex="0">
      <div class="question">?</div>
      <p>How to improve eye health?</p>
    </div>

    <div class="trends-card">
      <div class="trends-header">
        <h2>Session Trends</h2>
      </div>
      <div class="chart-container">
        <canvas id="chart-session"></canvas>
      </div>
    </div>

  </main>

  <div class="faq-overlay" id="faq-overlay" hidden>
    <div class="faq-modal" id="faq-modal">
      <h3 id="faq-modal-title"></h3>
      <p id="faq-modal-answer"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
